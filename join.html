  <script>
    // U-JOIN-OG1-20260707: ?ref=CODE -> t.me deep link ?start=ref_CODE
    // (same payload format start() already parses). Sanitized to the
    // referral code alphabet; anything else falls back to start=profit.
    (function () {
      var raw = new URLSearchParams(location.search).get('ref') || '';
      var code = raw.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 12);
      if (code.length >= 4) {
        document.getElementById('tgBtn').href =
          'https://t.me/Clawmimoto_bot?start=ref_' + code;
        var b = document.getElementById('refBadge');
        b.textContent = 'INVITED \u00b7 CODE ' + code;
        b.style.display = 'block';
      }
    })();
  </script>
